<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast - Chế độ khách</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* GIỮ NGUYÊN CSS CŨ */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.7);
            --text-dark: #2c3e50;
            --text-light: #7f8c8d;
            --accent-color: #4facfe;
            --accent-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        .dashboard-container {
            width: 100%;
            max-width: 1400px;
            height: 95vh;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            display: flex;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
        }

        .sidebar {
            width: 250px;
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255, 255, 255, 0.3);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-list {
            list-style: none;
        }

        .menu-item {
            padding: 15px 20px;
            margin-bottom: 10px;
            border-radius: 15px;
            color: var(--text-light);
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 500;
            font-size: 14px;
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, 0.5);
            color: var(--text-dark);
        }

        .menu-item.active {
            background: var(--accent-gradient);
            color: white;
            box-shadow: 0 10px 20px rgba(79, 172, 254, 0.3);
        }

        /* CSS MỚI CHO GUEST: Nút đăng nhập ở Sidebar */
        .auth-buttons {
            margin-top: auto;
        }

        /* Đẩy xuống đáy */
        .btn-sidebar-login {
            display: block;
            width: 100%;
            padding: 12px;
            text-align: center;
            background: white;
            color: var(--accent-color);
            font-weight: 600;
            border-radius: 15px;
            text-decoration: none;
            border: 2px solid transparent;
            transition: 0.3s;
        }

        .btn-sidebar-login:hover {
            border-color: var(--accent-color);
        }

        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        /* HEADER GUEST */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            color: var(--text-dark);
        }

        .header p {
            color: var(--text-light);
            font-size: 14px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Nút Đăng ký to đẹp ở Header */
        .btn-register-cta {
            background: var(--accent-gradient);
            color: white;
            padding: 10px 25px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 600;
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4);
            transition: 0.3s;
        }

        .btn-register-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(79, 172, 254, 0.6);
        }

        .search-bar {
            background: white;
            padding: 10px 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .search-bar input {
            border: none;
            outline: none;
            width: 200px;
        }

        /* BENTO GRID (Giữ nguyên) */
        .bento-grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr;
            grid-template-rows: auto auto;
            gap: 25px;
        }

        .card {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.85);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .main-weather-card {
            grid-column: 1 / 2;
            grid-row: 1 / 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .temp-display {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 10px;
        }

        .big-temp {
            font-size: 60px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .big-icon {
            font-size: 80px;
            color: #f39c12;
        }

        .weather-meta {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .meta-item {
            background: white;
            padding: 10px 20px;
            border-radius: 15px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .chart-card {
            grid-column: 2 / 4;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        /* Blur hiệu ứng khoá tính năng */
        .locked-feature {
            filter: blur(4px);
            opacity: 0.6;
            pointer-events: none;
        }

        .lock-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            flex-direction: column;
            gap: 10px;
        }

        .lock-icon {
            font-size: 30px;
            color: var(--text-dark);
            background: white;
            padding: 15px;
            border-radius: 50%;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .lock-text {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .forecast-list-card {
            grid-column: 1 / 2;
            grid-row: 2 / 4;
        }

        .forecast-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .promo-card {
            grid-column: 2 / 4;
            background: var(--accent-gradient);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .promo-btn {
            background: white;
            color: var(--accent-color);
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 600;
            width: fit-content;
            cursor: pointer;
            margin-top: 10px;
        }

        @media (max-width: 1024px) {
            .dashboard-container {
                flex-direction: column;
                height: auto;
            }

            .sidebar {
                width: 100%;
                border-right: none;
                flex-direction: row;
                align-items: center;
                padding: 20px;
            }

            .menu-list,
            .auth-buttons {
                display: none;
            }

            /* Mobile ẩn hết menu */
            .bento-grid {
                grid-template-columns: 1fr;
            }

            .chart-card,
            .promo-card,
            .main-weather-card {
                grid-column: 1;
            }

            body {
                height: auto;
                display: block;
            }
        }
    </style>
</head>

<body>

    <div class="dashboard-container">
        <nav class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-cloud-bolt"></i> SkyCast
            </div>
            <ul class="menu-list">

                <a href="guest_index.html" style="text-decoration: none; display: block;">
                    <li class="menu-item" style="justify-content: space-between; transition: 0.3s;">
                        <span style="display: flex; gap: 15px; align-items: center;">
                            <i class="fa-solid fa-chart-pie"></i> Tổng quan
                        </span>

                        <!-- <i class="fa-solid fa-lock" style="font-size: 12px; opacity: 0.6;"></i> -->
                    </li>
                </a>


                <a href="guest_bando.html" style="text-decoration: none; display: block;">
                    <li class="menu-item active" style="justify-content: space-between; transition: 0.3s;">
                        <span style="display: flex; gap: 15px; align-items: center;">
                            <i class="fa-solid fa-map-location-dot"></i> Bản đồ
                        </span>

                        <!-- <i class="fa-solid fa-lock" style="font-size: 12px; opacity: 0.6;"></i> -->
                    </li>
                </a>
            </ul>

            <div class="auth-buttons">
                <a href="../login.html" class="btn-sidebar-login">Đăng nhập</a>
            </div>
        </nav>

        <main class="main-content">
            <header class="header">
                <div>
                    <h1>Chào bạn mới!</h1>
                    <p>Khám phá thời tiết hôm nay nhé.</p>
                </div>

                <div class="header-actions">
                    <div class="search-bar">
                        <i class="fa-solid fa-magnifying-glass" style="color: #ccc;"></i>
                        <input type="text" placeholder="Tìm thành phố...">
                    </div>
                    <a href="../register.html" class="btn-register-cta">Đăng ký ngay</a>
                </div>
            </header>

            <div class="bento-grid">



            </div>
        </main>
    </div>

</body>

</html>
