<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast - Khôi phục mật khẩu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Vẫn giữ nguyên bộ CSS cũ để đồng bộ 100% */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background: linear-gradient(120deg, #a1c4fd 0%, #c2e9fb 100%);
            padding: 20px;
        }

        .container-card {
            display: flex; flex-direction: row; width: 100%; max-width: 900px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            min-height: 500px;
        }

        /* Cột Trái - Icon cái khóa mở ra */
        .brand-panel {
            flex: 0.8; padding: 40px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%);
            color: white; text-align: center; position: relative;
        }
        
        .brand-panel::before {
            content: ''; position: absolute; top: -50px; left: -50px;
            width: 150px; height: 150px; background: rgba(255, 255, 255, 0.2); border-radius: 50%;
        }

        .brand-icon { font-size: 80px; margin-bottom: 20px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1)); }
        .brand-title { font-size: 32px; font-weight: 700; margin-bottom: 10px; }
        .brand-desc { font-size: 15px; opacity: 0.9; max-width: 260px; line-height: 1.5; }

        /* Cột Phải - Form */
        .form-panel {
            flex: 1.2; padding: 50px;
            display: flex; flex-direction: column; justify-content: center;
        }

        .form-header { margin-bottom: 30px; }
        .form-header h2 { font-size: 28px; color: #2c3e50; font-weight: 700; margin-bottom: 5px; }
        .form-header p { font-size: 14px; color: #7f8c8d; }

        .input-group { margin-bottom: 25px; position: relative; }
        .input-group label { display: block; font-size: 13px; color: #34495e; margin-bottom: 8px; font-weight: 600; }
        .input-group input {
            width: 100%; padding: 12px 15px; padding-left: 40px;
            border: 2px solid #eef2f5; border-radius: 12px;
            background: #f4f7f6; outline: none; transition: 0.3s; color: #2c3e50;
        }
        .input-group input:focus { border-color: #4facfe; background: #fff; }
        .input-group i { position: absolute; left: 15px; top: 38px; color: #a4b0be; font-size: 14px; }

        .btn-submit {
            width: 100%; padding: 15px; margin-top: 5px; border: none; border-radius: 12px;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s;
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4);
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(79, 172, 254, 0.6); }

        .back-link { margin-top: 25px; text-align: center; }
        .back-link a { 
            color: #7f8c8d; text-decoration: none; font-size: 14px; font-weight: 500; display: inline-flex; align-items: center; gap: 5px; transition: 0.3s;
        }
        .back-link a:hover { color: #4facfe; transform: translateX(-3px); }

        @media (max-width: 768px) {
            .container-card { flex-direction: column; }
            .brand-panel { padding: 30px; min-height: 180px; }
        }
    </style>
</head>
<body>

    <div class="container-card">
        <div class="brand-panel">
            <div class="brand-icon">
                <i class="fa-solid fa-unlock-keyhole"></i> </div>
            <h1 class="brand-title">Recovery</h1>
            <p class="brand-desc">Đừng lo lắng! Chúng tôi sẽ giúp bạn lấy lại tài khoản trong vài bước.</p>
        </div>

        <div class="form-panel">
            <div class="form-header">
                <h2>Quên mật khẩu?</h2>
                <p>Nhập email đã đăng ký để nhận hướng dẫn đặt lại mật khẩu.</p>
            </div>

            <form action="login.html"> <div class="input-group">
                    <label>Email khôi phục</label>
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" placeholder="name@example.com" required>
                </div>

                <button type="submit" class="btn-submit">Gửi liên kết</button>
            </form>

            <div class="back-link">
                <a href="login.html">
                    <i class="fa-solid fa-arrow-left"></i> Quay lại Đăng nhập
                </a>
            </div>
        </div>
    </div>

</body>
</html>
